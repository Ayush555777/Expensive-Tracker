<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sign up — Expense Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="page-signup">

<main class="auth-viewport">
  <div class="auth-card glass shadow-lg">
    <div class="d-flex gap-3 align-items-center mb-3">
      <div class="brand-logo">💼</div>
      <div>
        <h2 class="m-0">Create account</h2>
        <small class="muted">Local demo (no server)</small>
      </div>
    </div>

    <form id="signupForm" novalidate>
      <div class="mb-2">
        <label class="form-label">Email</label>
        <input id="signupEmail" type="email" class="form-control" required>
        <div class="invalid-feedback">Please provide a valid email.</div>
      </div>

      <div class="mb-2">
        <label class="form-label">Password</label>
        <div class="input-group">
          <input id="signupPassword" type="password" class="form-control" required minlength="6">
          <button id="toggleSignupPwd" type="button" class="btn btn-outline-secondary"><i class="fa fa-eye"></i></button>
        </div>
        <div class="form-text">Min 6 characters</div>
      </div>

      <div class="mb-2">
        <label class="form-label">Display name</label>
        <input id="signupName" class="form-control">
      </div>

      <button class="btn btn-success w-100">Create account</button>

      <div class="text-center mt-2">
        <small>Already have account? <a href="index.html">Login</a></small>
      </div>
    </form>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
